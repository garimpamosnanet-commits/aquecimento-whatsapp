<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KS Digital</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8f9fb;
            color: #111827;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(59, 130, 246, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(249, 115, 22, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 18px;
            padding: 44px 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
            animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-logo img {
            height: 80px;
            width: auto;
            object-fit: contain;
        }
        .login-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #111827;
        }
        .login-subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 4px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: #f1f3f8;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            color: #111827;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s;
        }
        .form-group input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
            background: white;
        }
        .form-group input::placeholder { color: #9ca3af; }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            box-shadow: 0 1px 3px rgba(59, 130, 246, 0.2);
        }
        .btn-login:hover {
            background: #2563eb;
            box-shadow: 0 3px 12px rgba(59, 130, 246, 0.25);
            transform: translateY(-1px);
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            color: #EF4444;
            font-size: 13px;
            font-weight: 500;
            margin-top: 14px;
            display: none;
        }
        .error-msg.visible { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo"><img src="/ks-logo.png" alt="KS"></div>
        <div class="login-title">KS Digital</div>
        <div class="login-subtitle">Command Center — Aquecimento WhatsApp</div>
        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">Entrar</button>
            <div class="error-msg" id="error-msg">E-mail ou senha incorretos</div>
        </form>
    </div>

    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            errEl.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errEl.classList.add('visible');
                }
            } catch (err) {
                errEl.textContent = 'Erro de conexao';
                errEl.classList.add('visible');
            }

            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    </script>
</body>
</html>
