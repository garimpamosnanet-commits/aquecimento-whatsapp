<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aquecimento WhatsApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f1117;
            --bg-card: #1e2130;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4285f4;
            --accent-hover: #5a9cf5;
            --danger: #ea4335;
            --border: #2d3142;
        }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .login-logo { font-size: 48px; margin-bottom: 12px; }
        .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .login-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: var(--accent-hover); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">🔥</div>
        <div class="login-title">Aquecimento WhatsApp</div>
        <div class="login-subtitle">Faca login para acessar o painel</div>
        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">Entrar</button>
            <div class="error-msg" id="error-msg">Usuario ou senha incorretos</div>
        </form>
    </div>

    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            errEl.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errEl.classList.add('visible');
                }
            } catch (err) {
                errEl.textContent = 'Erro de conexao';
                errEl.classList.add('visible');
            }

            btn.disabled = false;
            btn.textContent = 'Entrar';
        }

        // Enter to submit
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin(e);
        });
    </script>
</body>
</html>
